<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyton Mupanga</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            max-width: 600px;
            margin: auto;
            line-height: 1.6;
            color: #ccc;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            border: 1px solid #555;
        }

        .buttons a:hover {
            background: white;
            color: black;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="profile.jpg" alt="Lyton Mupanga">

    <h1>Lyton Mupanga</h1>

    <p>
        Chemical Engineering Student | CEO of Bluesville Group | Content Creator | Podcast Host of Brainwaves Unplugged.
        Passionate about innovation, leadership, and building global impact brands.
    </p>

    <div class="buttons">
        <a href="#">LinkedIn</a>
        <a href="#">YouTube</a>
        <a href="#">Instagram</a>
    </div>

    <footer>
        © 2026 Lyton Mupanga
    </footer>

</div>

</body>
</html>
